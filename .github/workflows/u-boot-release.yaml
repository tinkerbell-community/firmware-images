name: Build and Release U-Boot Raspberry Pi Image

on:
  workflow_dispatch:
    inputs:
      uboot:
        description: "U-Boot version tag to build"
        required: false
        type: string
      firmware:
        description: "Raspberry Pi firmware version"
        required: false
        type: string
      kernel:
        description: "Talos kernel OCI image version tag (e.g. v1.10.0)"
        required: false
        type: string
  push:
    paths:
      - 'u-boot/**'

jobs:
  determine-version:
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.version.outputs.release }}
      uboot: ${{ steps.version.outputs.uboot }}
      firmware: ${{ steps.version.outputs.firmware }}
      talos_kernel: ${{ steps.version.outputs.talos_kernel }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read versions from file
        id: version
        run: |
          VERSION_FILE="u-boot/version"

          # Parse values from version file
          FILE_UBOOT_VER=$(grep '^uboot ' "$VERSION_FILE" | awk '{print $2}')
          FILE_FIRMWARE_VER=$(grep '^firmware ' "$VERSION_FILE" | awk '{print $2}')
          FILE_TALOS_KERNEL_VER=$(grep '^talos_kernel ' "$VERSION_FILE" | awk '{print $2}')

          # Use workflow_dispatch inputs if provided, otherwise use file values
          uboot="${{ inputs.uboot }}"
          uboot="${uboot:-$FILE_UBOOT_VER}"

          firmware="${{ inputs.firmware }}"
          firmware="${firmware:-$FILE_FIRMWARE_VER}"

          talos_kernel="${{ inputs.kernel }}"
          talos_kernel="${talos_kernel:-$FILE_TALOS_KERNEL_VER}"

          release="u-boot-${uboot}"

          echo "uboot=$uboot" >> $GITHUB_OUTPUT
          echo "firmware=$firmware" >> $GITHUB_OUTPUT
          echo "talos_kernel=$talos_kernel" >> $GITHUB_OUTPUT
          echo "release=$release" >> $GITHUB_OUTPUT
          echo "Release version: $release"

  build-uboot:
    needs: determine-version
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          path: src
          ref: ${{ github.ref }}

      - name: Checkout u-boot
        uses: actions/checkout@v4
        with:
          repository: u-boot/u-boot
          fetch-depth: 1
          path: u-boot
          ref: ${{ needs.determine-version.outputs.uboot }}

      - name: Cache and install build dependencies
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: build-essential git bison flex bc libssl-dev libgnutls28-dev device-tree-compiler
          version: 1.0

      - name: Configure U-Boot for Raspberry Pi 4 ARM64
        working-directory: u-boot
        run: |
          patch -p1 < ${{ github.workspace }}/src/u-boot/patches/rpi_arm64_defconfig.patch

          make LOCALVERSION_AUTO=n LOCALVERSION= rpi_arm64_defconfig

      - name: Build U-Boot
        working-directory: u-boot
        run: |
          make LOCALVERSION_AUTO=n LOCALVERSION= -j $(nproc) HOSTLDLIBS_mkimage="-lssl -lcrypto"
          ls -la u-boot.bin

      - name: Upload U-Boot binary
        uses: actions/upload-artifact@v4
        with:
          name: uboot-binary
          path: u-boot/u-boot.bin
          retention-days: 1
          if-no-files-found: error

  checkout-firmware:
    needs: determine-version
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Raspberry Pi firmware
        uses: actions/checkout@v4
        with:
          repository: raspberrypi/firmware
          fetch-depth: 1
          path: firmware
          ref: ${{ needs.determine-version.outputs.firmware }}

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: rpi-firmware
          path: |
            firmware/boot/*.elf
            firmware/boot/*.dat
            firmware/boot/*.bin
            firmware/overlays/*.dtbo
          retention-days: 1
          if-no-files-found: error

  prepare-config:
    needs: determine-version
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload config.txt
        uses: actions/upload-artifact@v4
        with:
          name: config-files
          path: u-boot/config.txt
          retention-days: 1
          overwrite: true
          if-no-files-found: error

  extract-kernel-dtbs:
    needs: determine-version
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          path: src

      - name: Setup crane
        uses: imjasonh/setup-crane@v0.5

      - name: Install build dependencies
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: device-tree-compiler
          version: 1.0

      - name: Extract DTBs from Talos kernel OCI image
        run: |
          mkdir -p out/overlays

          echo "Extracting DTBs from ghcr.io/siderolabs/kernel:${{ needs.determine-version.outputs.talos_kernel }}..."
          crane export --platform linux/arm64 \
            ghcr.io/siderolabs/kernel:${{ needs.determine-version.outputs.talos_kernel }} \
            /tmp/talos-kernel.tar

          tar -xf /tmp/talos-kernel.tar --strip-components=2 -C out/ \
            $(tar -tf /tmp/talos-kernel.tar | grep -E '^dtb/broadcom/bcm27[^/]+\.dtb$')
          rm /tmp/talos-kernel.tar

          echo "Extracted device tree files:"
          ls -lah out/*.dtb

          if [ -z "$(ls out/bcm2711*.dtb 2>/dev/null)" ]; then
            echo "ERROR: No bcm2711* device tree files extracted"
            exit 1
          fi

      - name: Build custom overlay device trees
        run: |
          export DTC_FLAGS="-R 0 -p 0 -@ -H epapr"
          for dts in src/u-boot/patches/dtb/overlays/*.dts; do
            # disable-v3d-overlay.dts -> disable-v3d
            target=$(basename "${dts%*-overlay.dts}")
            echo "Building $target.dtbo"
            dtc -O dtb $DTC_FLAGS -o "out/overlays/$target.dtbo" "$dts"
          done

          echo "Built overlay files:"
          ls -lah out/overlays/

      - name: Upload kernel device tree files
        uses: actions/upload-artifact@v4
        with:
          name: kernel-dts
          path: |
            out/*.dtb
            out/overlays/
          retention-days: 1
          if-no-files-found: error

  build-image:
    needs: [determine-version, build-uboot, checkout-firmware, prepare-config, extract-kernel-dtbs]
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
      packages: write
      id-token: write

    outputs:
      image_name: ${{ steps.create_image.outputs.image_name }}
      image_size: ${{ steps.create_image.outputs.image_size }}
      release: ${{ needs.determine-version.outputs.release }}

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Cache and install build dependencies
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: dosfstools parted xz-utils genisoimage
          version: 1.0

      - name: Prepare build directory
        run: |
          mkdir -p build
          mkdir -p mnt
          mkdir -p out

          # Copy U-Boot binaries
          cp artifacts/uboot-*/*.bin build/
          ls -lah build/

          # Copy config file
          cp artifacts/config-files/config.txt build/

          # Copy firmware files
          cp -r artifacts/rpi-firmware/* build/

          mkdir -p build/broadcom
          cp -r artifacts/kernel-dts/*.dtb build/broadcom/
          cp -r artifacts/kernel-dts/*.dtb build/

          mkdir -p build/overlays
          cp -r artifacts/kernel-dts/overlays/. build/overlays/
          echo "Overlay files:"
          ls -lah build/overlays/

          echo "Build directory contents:"
          ls -lah build/

      - name: Create SD card image
        id: create_image
        working-directory: out
        env:
          release: ${{ needs.determine-version.outputs.release }}
        run: |
          # Calculate required size (boot files + 100MB padding)
          BOOT_SIZE=$(du -sm ../build | cut -f1)
          IMAGE_SIZE=$((BOOT_SIZE + 100))

          echo "Creating ${IMAGE_SIZE}MB image..."

          # Create image file with semantic version
          IMAGE_NAME="uboot-rpi.img"
          dd if=/dev/zero of="$IMAGE_NAME" bs=1M count=$IMAGE_SIZE status=progress

          # Create GPT partition table with EFI System Partition for UEFI boot
          cat > partition.sfdisk << 'SFDISK_EOF'
          label: gpt
          unit: sectors
          sector-size: 512

          start=2048, type=uefi, name="EFI"
          SFDISK_EOF

          sfdisk "$IMAGE_NAME" < partition.sfdisk

          # Setup loop device
          LOOP_DEVICE=$(sudo losetup --find --show --partscan "$IMAGE_NAME")
          echo "Loop device: $LOOP_DEVICE"

          # Wait for udev to create GPT partition device nodes (avoids race condition)
          sudo udevadm settle

          # Format partition as FAT32 with explicit parameters
          sudo mkfs.vfat -F 32 -n "EFI" "${LOOP_DEVICE}p1"

          # Mount and copy files
          sudo mount "${LOOP_DEVICE}p1" ../mnt
          sudo cp -rv ../build/* ../mnt/
          sudo sync
          sudo umount ../mnt

          # Cleanup
          sudo losetup -d "$LOOP_DEVICE"

          # Calculate checksums
          sha256sum "$IMAGE_NAME" > "${IMAGE_NAME}.sha256"

          # Get image info
          IMAGE_SIZE_BYTES=$(stat -c%s "$IMAGE_NAME")
          echo "image_name=$IMAGE_NAME" >> $GITHUB_OUTPUT
          echo "image_size=$IMAGE_SIZE_BYTES" >> $GITHUB_OUTPUT

          ls -lh "$IMAGE_NAME"*

      - name: Compress SD card image
        working-directory: out
        env:
          IMAGE_NAME: ${{ steps.create_image.outputs.image_name }}
        run: |
          echo "Compressing SD card image..."
          xz -9 -T 0 "${IMAGE_NAME}"
          sha256sum "${IMAGE_NAME}.xz" > "${IMAGE_NAME}.xz.sha256"

      - name: Create release notes
        working-directory: out
        env:
          release: ${{ needs.determine-version.outputs.release }}
        run: |
          cat > release_notes.md << EOF
          # Raspberry Pi 4 U-Boot SD Card Image

          ## Components

          - **U-Boot Version**: \`${{ needs.determine-version.outputs.uboot }}\`
          - **Release Version**: \`${release}\`
          - **Raspberry Pi Firmware**: \`${{ needs.determine-version.outputs.firmware }}\`
          - **Talos Kernel**: \`${{ needs.determine-version.outputs.talos_kernel }}\`
          - **Architecture**: ARM64 (aarch64)
          - **Target Device**: Raspberry Pi 4 / Raspberry Pi 400

          ## Features

          - PXE network boot support
          - DHCP client built-in
          - EFI boot support
          - USB storage boot
          - NVMe boot support (with patches)
          - Custom boot command for network-first boot
          - SMBIOS table generation (UEFI config table passed to OS)

          ## Installation

          ### Using Raspberry Pi Imager

          1. Download \`${{ steps.create_image.outputs.image_name }}.xz\`
          2. Open Raspberry Pi Imager
          3. Choose "Use custom" and select the downloaded \`.xz\` file
          4. Select your SD card
          5. Write the image

          ### Using dd (Linux/macOS)

          \`\`\`bash
          # Decompress
          xz -d ${{ steps.create_image.outputs.image_name }}.xz

          # Write to SD card (replace /dev/sdX with your SD card device)
          sudo dd if=${{ steps.create_image.outputs.image_name }} of=/dev/sdX bs=4M status=progress
          sudo sync
          \`\`\`

          ## Boot Configuration

          The image includes a custom \`config.txt\` that:
          - Enables 64-bit ARM mode
          - Uses U-Boot as the kernel
          - Configures minimal GPU memory
          - Enables UART for debugging

          ## Talos NoCloud Provisioning

          Set the SMBIOS serial number to configure Talos's NoCloud metadata server before first boot:

          \`\`\`bash
          # From a Tinkerbell workflow action after flashing the SD card
          mount /dev/mmcblk0p1 /boot
          fw_setenv -c /boot/fw_env.config serial# "ds=nocloud-net;s=http://10.10.0.1/configs/;h=HOSTNAME"
          umount /boot
          \`\`\`

          Talos reads \`/sys/class/dmi/id/product_serial\` and fetches:
          - \`http://10.10.0.1/configs/user-data\` (machine config)
          - \`http://10.10.0.1/configs/network-config\` (optional)

          ## Boot Sequence

          The default boot order:
          1. Attempt USB disk boot (EFI)
          2. Attempt network boot via DHCP/PXE
          3. Fall back to local disk

          ## Verification

          Verify the image integrity:

          \`\`\`bash
          sha256sum -c ${{ steps.create_image.outputs.image_name }}.xz.sha256
          \`\`\`

          ## Image Information

          - **Uncompressed Size**: ${{ steps.create_image.outputs.image_size }} bytes
          - **Format**: Raw disk image (MBR partition table, FAT32 boot partition)

          ---

          *Built on $(date -u +"%Y-%m-%d %H:%M:%S UTC")*
          EOF

          cat release_notes.md

      - name: Upload final artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rpi4-uboot-image
          path: |
            out/${{ steps.create_image.outputs.image_name }}.xz
            out/${{ steps.create_image.outputs.image_name }}.xz.sha256
            out/release_notes.md
          retention-days: 30

      - name: Report build status
        env:
          release: ${{ needs.determine-version.outputs.release }}
        run: |
          echo "✅ U-Boot SD card image created successfully"
          echo "📦 SD Image: ${{ steps.create_image.outputs.image_name }}.xz"
          echo "📏 SD Uncompressed size: ${{ steps.create_image.outputs.image_size }} bytes"
          echo "🔖 U-Boot version: ${{ needs.determine-version.outputs.uboot }}"
          echo "🔖 Release version: ${release}"
          echo "🔖 Firmware version: ${{ needs.determine-version.outputs.firmware }}"

  publish-github-release:
    name: Publish GitHub Release
    needs: build-image
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: rpi4-uboot-image
          path: artifacts

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.build-image.outputs.release }}
          name: Release ${{ needs.build-image.outputs.release }}
          body_path: artifacts/release_notes.md
          files: |
            artifacts/${{ needs.build-image.outputs.image_name }}.xz
            artifacts/${{ needs.build-image.outputs.image_name }}.xz.sha256
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
