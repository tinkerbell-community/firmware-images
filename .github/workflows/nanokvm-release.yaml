name: Build and Release NanoKVM Image

on:
  workflow_dispatch:
    inputs:
      source_version:
        description: "LicheeSG-Nano-Build release version"
        required: false
        type: string
      app_version:
        description: "NanoKVM release version"
        required: false
        type: string
  push:
    # tags:
    #   - 'v*'
    paths:
      - 'nanokvm/**'

env:
  SOURCE_VERSION: ${{ inputs.source_version || 'v2.4.0-25' }}
  APP_VERSION: ${{ inputs.app_version || 'v2.3.15' }}

jobs:
  build-image:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    outputs:
      image_name: ${{ steps.build.outputs.image_name }}
      release_version: ${{ steps.version.outputs.release_version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine release version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ] && echo "${{ github.ref }}" | grep -q "^refs/tags/"; then
            RELEASE_VERSION="${{ github.ref_name }}"
          else
            RELEASE_VERSION="${{ env.SOURCE_VERSION }}-nanokvm"
          fi
          echo "release_version=${RELEASE_VERSION}" >> $GITHUB_OUTPUT
          echo "Release version: ${RELEASE_VERSION}"

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y curl xz-utils

      - name: Download base image
        run: |
          mkdir -p out
          curl -fSL -o out/licheervnano-kvm_sd.img.xz "https://github.com/scpcom/LicheeSG-Nano-Build/releases/download/${{ env.SOURCE_VERSION }}/licheervnano-kvm_sd.img.xz"

      - name: Decompress image
        run: |
          echo "Decompressing image..."
          xz -dc out/licheervnano-kvm_sd.img.xz > out/pikvm.img

      - name: Apply overlay files
        id: build
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.release_version }}
        run: |
          OVERLAY_DIR="${{ github.workspace }}/nanokvm/overlay"
          OUTPUT="out/pikvm.img"
          MOUNT_DIR="$(mktemp -d)"
          LOOP_DEV=""

          cleanup() {
            if mount | grep -q " ${MOUNT_DIR} " 2>/dev/null; then
              sudo umount "${MOUNT_DIR}"
            fi
            [ -n "${LOOP_DEV}" ] && sudo losetup -d "${LOOP_DEV}" 2>/dev/null || true
            rm -rf "${MOUNT_DIR}"
          }
          trap cleanup EXIT

          LOOP_DEV=$(sudo losetup --find --show --partscan "${OUTPUT}")
          echo "Loop device: ${LOOP_DEV}"

          if [ -b "${LOOP_DEV}p2" ]; then
            PART="${LOOP_DEV}p2"
          elif [ -b "${LOOP_DEV}p1" ]; then
            PART="${LOOP_DEV}p1"
          else
            echo "ERROR: No usable partition found on ${LOOP_DEV}" >&2
            exit 1
          fi

          echo "Mounting ${PART} at ${MOUNT_DIR}..."
          sudo mount "${PART}" "${MOUNT_DIR}"

          echo "Applying overlay files from ${OVERLAY_DIR}..."
          sudo cp -av "${OVERLAY_DIR}/." "${MOUNT_DIR}/"

          sudo rm -rf "${MOUNT_DIR}/kvmapp"
          sudo mkdir -p "${MOUNT_DIR}/kvmapp"
          export APP_VERSION="${{ env.APP_VERSION }}"
          curl -sfL https://github.com/BMCPi/NanoKVM/releases/download/${APP_VERSION}/NanoKVM_${APP_VERSION#v}.tar.gz | sudo tar -xz -C "${MOUNT_DIR}/kvmapp/"

          sudo cp -av "${MOUNT_DIR}/kvmapp/system/." "${MOUNT_DIR}/"

          sudo umount "${MOUNT_DIR}"
          LOOP_DEV_TMP="${LOOP_DEV}"
          LOOP_DEV=""
          sudo losetup -d "${LOOP_DEV_TMP}"
          trap - EXIT

          IMAGE_NAME="nanokvm-${RELEASE_VERSION}.img"
          mv "${OUTPUT}" "out/${IMAGE_NAME}"
          echo "image_name=${IMAGE_NAME}" >> $GITHUB_OUTPUT
          echo "Built image: ${IMAGE_NAME}"

      - name: Compress image
        env:
          IMAGE_NAME: ${{ steps.build.outputs.image_name }}
        run: |
          echo "Compressing out/${IMAGE_NAME}..."
          xz -T0 -z "out/${IMAGE_NAME}"
          sha256sum "out/${IMAGE_NAME}.xz" > "out/${IMAGE_NAME}.xz.sha256"
          echo "Compressed image:"
          ls -lah "out/${IMAGE_NAME}.xz"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nanokvm-image
          path: |
            out/${{ steps.build.outputs.image_name }}.xz
            out/${{ steps.build.outputs.image_name }}.xz.sha256
          retention-days: 7
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    needs: build-image
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: nanokvm-image
          path: artifacts

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.build-image.outputs.release_version }}
          name: Release ${{ needs.build-image.outputs.release_version }}
          files: |
            artifacts/${{ needs.build-image.outputs.image_name }}.xz
            artifacts/${{ needs.build-image.outputs.image_name }}.xz.sha256
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
